name: Production Health Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check /api/health
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl -fsS https://galaretkarnia.onrender.com/api/health)"
          echo "Health response: $response"

          echo "$response" | grep -q '"status":"ok"'
          echo "$response" | grep -q '"database"'
          echo "$response" | grep -q '"connected":true'

  alert-on-failure:
    if: failure()
    needs: health-check
    runs-on: ubuntu-latest

    steps:
      - name: Send email alert
        shell: bash
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          set -euo pipefail

          if [ -z "${RESEND_API_KEY:-}" ] || [ -z "${ALERT_EMAIL_FROM:-}" ] || [ -z "${ALERT_EMAIL_TO:-}" ]; then
            echo "Missing required secrets: RESEND_API_KEY, ALERT_EMAIL_FROM, ALERT_EMAIL_TO"
            exit 1
          fi

          subject="ALERT: Production health-check failing"
          workflow_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          html="Automatyczny monitor wykryl blad health-check.<br><br>Endpoint: https://galaretkarnia.onrender.com/api/health<br>Workflow run: ${workflow_url}<br><br>Sprawdz backend na Render i logi aplikacji."
          payload=$(printf '{"from":"%s","to":["%s"],"subject":"%s","html":"%s"}' "$ALERT_EMAIL_FROM" "$ALERT_EMAIL_TO" "$subject" "$html")

          curl -fsS https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$payload"
